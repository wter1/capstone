<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - Minime</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Upload Resume</h1>
    </header>

    <main>
        <div class="card-grid" style="margin-top: 2rem;">
            <section class="card card-full">
                <p>Upload your resume to generate brand outputs from your experience.</p>

                {% if resume_exists %}
                <p class="note">A resume is already uploaded. Uploading a new file will replace it.</p>
                {% endif %}

                {% if error %}
                <p class="error">{{ error }}</p>
                {% endif %}

                <form method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="resume">Resume file (.pdf or .txt)</label>
                        <input type="file" id="resume" name="resume" accept=".pdf,.txt" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn">Upload Resume</button>
                        <a href="{{ url_for('profile') }}" class="btn secondary">Back</a>
                    </div>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
